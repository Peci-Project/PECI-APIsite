openapi: 3.0.0
info:
  title: Parques
  version: 2.0.0
  description: |
     # Visão Geral
      Esta serviço fornece dados em tempo real sobre os parques de estacionamento disponíveis da Universidade de Aveiro. 
      
      ## Funcionalidades Principais 
      - **Capacidade:** Consulta o número total de lugares, lugares ocupados e lugares livres em tempo real.
      - **Localização:** Obtém as coordenadas exatas (Latitude e Longitude) das cancelas para o acesso aos parques.
      - **Filtros:** Filtra resultados por parques específicos (como o P1 ou P5) ou por locais que ainda têm lugares livres.

servers:
  - url: http://services.web.ua.pt/parques

paths:
  /parques:
    get:
      tags:
        - Operações
      summary: Listar todos os parques
      description: |
        Retorna os dados relativos a todos os parques de estacionamento.
        Permite filtrar por identificador (`id`) e/ou disponibilidade (`livre`).
      parameters:
        - name: id
          in: query
          required: false
          description: |
            Filtra os dados relativos a um ou mais parques específicos.
            Aceita um único identificador (ex.: `P1`) ou vários separados por vírgula (ex.: `P1,P10`).

            Valores conhecidos:
            - `P1`: Público
            - `P5`: Cantina/Biblioteca
            - `P6`: ZTC
            - `P8`: Subterrâneo
            - `P9`: Cerâmica
            - `P10`: Edifício 2 e 3 / Línguas
            - `P11`: Edifício 1 / Incubadora
            - `P13`: ISCAA Público
            - `P14`: ISCAA Funcionários
            - `P15`: ESTGA
          schema:
            type: string
            example: P1,P10
        - name: livre
          in: query
          required: false
          description: |
            Filtra os parques por disponibilidade:
            - `true`: devolve parques com lugares livres.
            - `false`: devolve parques sem lugares disponíveis.
          schema:
            type: boolean
      responses:
        '200':
          description: Resposta com timestamp e lista de parques
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: '#/components/schemas/TimestampEntry'
                    - $ref: '#/components/schemas/Parque'
              examples:
                todosOsParques:
                  summary: Todos os parques
                  value:
                    - Timestamp: 1423519992
                    - ID: P1|4
                      Nome: Residencias
                      Latitude: 40.63155
                      Longitude: -8.656537
                      Capacidade: 663
                      Ocupado: 5
                      Livre: 658
                    - ID: P5
                      Nome: Biblioteca
                      Latitude: 40.630195
                      Longitude: -8.659275
                      Capacidade: 249
                      Ocupado: 2
                      Livre: 247
                    - ID: P6
                      Nome: ZTC
                      Latitude: 40.63041
                      Longitude: -8.659082
                      Capacidade: 10
                      Ocupado: 0
                      Livre: 10
                parquePorId:
                  summary: Dados de um parque (id=P1)
                  value:
                    - Timestamp: 1368692777
                    - ID: P1
                      Nome: Publico
                      Capacidade: 663
                      Ocupado: 308
                      Livre: 355
                variosParques:
                  summary: Dados de vários parques (id=P1,P10)
                  value:
                    - Timestamp: 1368692798
                    - ID: P1
                      Nome: Publico
                      Capacidade: 663
                      Ocupado: 311
                      Livre: 352
                    - ID: P10
                      Nome: Edificio 2 e 3
                      Capacidade: 36
                      Ocupado: 40
                      Livre: -4
                parquesComLugares:
                  summary: Parques com lugares livres (livre=true)
                  value:
                    - Timestamp: 1368692826
                    - ID: P1
                      Nome: Publico
                      Capacidade: 663
                      Ocupado: 314
                      Livre: 349
                    - ID: P5
                      Nome: Cantina
                      Capacidade: 249
                      Ocupado: 191
                      Livre: 58
                parquesSemLugares:
                  summary: Parques sem lugares disponíveis (livre=false)
                  value:
                    - Timestamp: 1368692899
                    - ID: P6
                      Nome: ZTC
                      Capacidade: 10
                      Ocupado: 35
                      Livre: -25
                    - ID: P10
                      Nome: Edificio 2 e 3
                      Capacidade: 36
                      Ocupado: 40
                      Livre: -4
                idELivre:
                  summary: Parques por id e disponibilidade (id=P1,P10&livre=true)
                  value:
                    - Timestamp: 1368692934
                    - ID: P1
                      Nome: Publico
                      Capacidade: 663
                      Ocupado: 317
                      Livre: 346

components:
  schemas:
    TimestampEntry:
      type: object
      properties:
        Timestamp:
          type: integer
          description: Momento em que foi realizado o pedido (Unix timestamp).
          example: 1423519992
      required:
        - Timestamp

    Parque:
      type: object
      properties:
        ID:
          type: string
          description: Identificador associado a um determinado parque.
          example: P1
        Nome:
          type: string
          description: Nome associado a um parque específico.
          example: Publico
        Latitude:
          type: number
          format: double
          description: Coordenada geográfica da cancela de acesso.
          example: 40.63155
        Longitude:
          type: number
          format: double
          description: Coordenada geográfica da cancela de acesso.
          example: -8.656537
        Capacidade:
          type: integer
          description: Número total de lugares do parque.
          example: 663
        Ocupado:
          type: integer
          description: Número de lugares indisponíveis no parque.
          example: 308
        Livre:
          type: integer
          description: Número de lugares disponíveis no parque (pode ser negativo).
          example: 355
      required:
        - ID
        - Nome
        - Capacidade
        - Ocupado
        - Livre